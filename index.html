<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="calculator">

        <header class="calculator-header">
            <h1>MY CALCULATOR</h1>
        </header>

        <section class="display-section">

            <div id="expression" class="expression"></div>

            <input
                type="text"
                id="display"
                value="0"
                readonly>

        </section>

        <section class="button-grid">

         
            <button class="action-btn" data-value="clear">C</button>
            <button class="action-btn" data-value="backspace">⌫</button>
            <button class="operator-btn" data-value="%">%</button>
            <button class="operator-btn" data-value="/">÷</button>

            
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button class="operator-btn" data-value="*">×</button>

          
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button class="operator-btn" data-value="-">−</button>

          
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button class="operator-btn" data-value="+">+</button>

           
            <button class="zero-btn" data-value="0">0</button>
            <button data-value=".">.</button>
            <button class="equals-btn" data-value="=">=</button>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
